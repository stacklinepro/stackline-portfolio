<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fav-grad-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2443F" />
      <stop offset="100%" stop-color="#A653BA" />
    </linearGradient>
    <linearGradient id="fav-grad-middle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A653BA" />
      <stop offset="100%" stop-color="#543C9E" />
    </linearGradient>
    <linearGradient id="fav-grad-bottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#543C9E" />
      <stop offset="100%" stop-color="#160f2b" />
    </linearGradient>
  </defs>
  <!-- Background Circle (same dark background as theme) -->
  <circle cx="50" cy="50" r="50" fill="#090514" />
  
  <!-- Stackline Logo positioned inside the circle -->
  <g transform="translate(18, 22)">
    <!-- Floating Dot -->
    <circle cx="48" cy="7" r="6" fill="#F2443F" />
    <!-- Top Pill -->
    <rect x="0" y="14" width="38" height="12" rx="6" fill="url(#fav-grad-top)" />
    <!-- Middle Pill -->
    <rect x="0" y="30" width="48" height="12" rx="6" fill="url(#fav-grad-middle)" />
    <!-- Bottom Pill -->
    <rect x="0" y="46" width="58" height="12" rx="6" fill="url(#fav-grad-bottom)" />
  </g>
</svg>
